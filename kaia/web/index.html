<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Kaia - Kitchen AI Assistant</title>
  <link rel="stylesheet" href="/web/static/index.css">
</head>

<body>
  <div id="loading">Loading…</div>
  <div id="content">
    <div id="image">
      <img id="main_image" src=" " alt="main image">
      <div id="overlay"></div>
      <div id="chat_separator">&nbsp;</div>
    </div>
    <div id="chat"></div>
  </div>

  <script type="module">
    import { AvatarClient, Dispatcher, ChatCommandHandler, ImageCommandHandler, ButtonGridCommandHandler,
             MicInput, MicController, Recorder, StatefulRecorder, SilenceDetector, Automaton, RealAudio,
             Message, Envelop } from '/frontend/scripts/index.js';
    import { WakeWordDetector } from '/frontend/scripts/wakeWordDetector.js';
    import { LoadingScreen } from '/frontend/scripts/loadingScreen.js';

    const loadingDiv = document.getElementById('loading');

    const chatDiv    = document.getElementById('chat');
    const imageDiv   = document.getElementById('main_image');
    const overlayDiv = document.getElementById('overlay');

    const client     = new AvatarClient({ baseUrl: window.location.origin });

    const dispatcher = new Dispatcher(client);

    new ChatCommandHandler({ dispatcher, container: chatDiv, baseUrl: window.location.origin });
    new ImageCommandHandler({ dispatcher, imgEl: imageDiv });
    new ButtonGridCommandHandler({ dispatcher, overlay: overlayDiv, client });

    new RealAudio({ dispatcher, baseUrl: window.location.origin });

    const input    = new MicInput();
    const recorder = new Recorder({ startBufferLength: 1.0, normalBufferLength: 0.3, dispatcher, baseUrl: window.location.origin });
    const stateful = new StatefulRecorder({ recorder, dispatcher });
    const silence  = new SilenceDetector({ timeBetweenReportsInSeconds: 0.5, decisionWindowSeconds: 1.0, reportingWindowSeconds: 0.1, silenceLevel: 0.01, dispatcher });
    const wake     = new WakeWordDetector({ sampleRateOfTheModel: 16000, words: ['computer'], modelUrl: '/frontend/models/vosk-model-small-en-us-0.15.zip?v=5', dispatcher });
    const automaton   = new Automaton({ silenceDetector: silence, wakeWordDetector: wake, statefulRecorder: stateful, dispatcher });
    const controller  = new MicController(input, m => automaton.process(m));

    dispatcher.start();
    new LoadingScreen(loadingDiv, [wake], () => {
      dispatcher.push(new Message('InitializationEvent', new Envelop(), {}));
      controller.start().catch(console.error);
    });
  </script>
</body>
</html>
